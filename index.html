<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GREEN-API Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 36px 32px;
      width: 100%;
      max-width: 880px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    .left { display: flex; flex-direction: column; gap: 12px; }
    .right { display: flex; flex-direction: column; }

    .section-title {
      font-size: 13px;
      color: #888;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      color: #222;
      outline: none;
      transition: border-color 0.2s;
      background: #fafafa;
    }

    input[type="text"]:focus { border-color: #25d366; background: #fff; }

    .divider {
      border: none;
      border-top: 1px solid #ececec;
      margin: 8px 0;
    }

    button {
      width: 100%;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover { background: #f0fdf4; border-color: #25d366; color: #128c4e; }
    button:active { background: #e8f9ee; }

    .field-group { display: flex; flex-direction: column; gap: 8px; }

    .response-label {
      font-size: 13px;
      color: #888;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    textarea#response {
      flex: 1;
      width: 100%;
      min-height: 320px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 14px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #222;
      background: #fafafa;
      resize: vertical;
      outline: none;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid #ccc;
      border-top-color: #25d366;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <!-- LEFT: controls -->
    <div class="left">

      <!-- Instance credentials -->
      <div class="field-group">
        <input type="text" id="idInstance" placeholder="idInstance" />
        <input type="text" id="apiToken" placeholder="ApiTokenInstance" />
      </div>

      <hr class="divider" />

      <!-- GET methods -->
      <button onclick="callGetSettings()">getSettings</button>
      <button onclick="callGetStateInstance()">getStateInstance</button>

      <hr class="divider" />

      <!-- sendMessage -->
      <div class="field-group">
        <input type="text" id="sendMsgPhone" placeholder="77771234567" />
        <input type="text" id="sendMsgText" placeholder="Текст сообщения" />
        <button onclick="callSendMessage()">sendMessage</button>
      </div>

      <hr class="divider" />

      <!-- sendFileByUrl -->
      <div class="field-group">
        <input type="text" id="sendFilePhone" placeholder="77771234567" />
        <input type="text" id="sendFileUrl" placeholder="https://my.site.com/img/horse.png" />
        <button onclick="callSendFileByUrl()">sendFileByUrl</button>
      </div>

    </div>

    <!-- RIGHT: response -->
    <div class="right">
      <div class="response-label">Ответ:</div>
      <textarea id="response" readonly placeholder="Здесь появится ответ..."></textarea>
      <div class="spinner" id="spinner"></div>
    </div>
  </div>

  <script>
    const API_HOST = 'https://api.green-api.com';

    function getCredentials() {
      return {
        id: document.getElementById('idInstance').value.trim(),
        token: document.getElementById('apiToken').value.trim(),
      };
    }

    function buildUrl(method) {
      const { id, token } = getCredentials();
      if (!id || !token) throw new Error('Заполните idInstance и ApiTokenInstance');
      return `${API_HOST}/waInstance${id}/${method}/${token}`;
    }

    function setResponse(data) {
      document.getElementById('response').value =
        typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    function loading(on) {
      document.getElementById('spinner').style.display = on ? 'block' : 'none';
    }

    async function get(method) {
      loading(true);
      try {
        const res = await fetch(buildUrl(method));
        const data = await res.json();
        setResponse(data);
      } catch (e) {
        setResponse('Ошибка: ' + e.message);
      } finally {
        loading(false);
      }
    }

    async function post(method, payload) {
      loading(true);
      try {
        const res = await fetch(buildUrl(method), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        setResponse(data);
      } catch (e) {
        setResponse('Ошибка: ' + e.message);
      } finally {
        loading(false);
      }
    }

    function formatPhone(raw) {
      return raw.replace(/\D/g, '') + '@c.us';
    }

    function callGetSettings()      { get('getSettings'); }
    function callGetStateInstance() { get('getStateInstance'); }

    function callSendMessage() {
      const phone = document.getElementById('sendMsgPhone').value.trim();
      const message = document.getElementById('sendMsgText').value.trim();
      if (!phone || !message) { setResponse('Ошибка: заполните номер и текст сообщения'); return; }
      post('sendMessage', { chatId: formatPhone(phone), message });
    }

    function callSendFileByUrl() {
      const phone   = document.getElementById('sendFilePhone').value.trim();
      const urlFile = document.getElementById('sendFileUrl').value.trim();
      if (!phone || !urlFile) { setResponse('Ошибка: заполните номер и URL файла'); return; }
      const fileName = urlFile.split('/').pop() || 'file';
      post('sendFileByUrl', { chatId: formatPhone(phone), urlFile, fileName, caption: '' });
    }
  </script>
</body>
</html>
